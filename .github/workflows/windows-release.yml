name: Build Windows release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de release à alimenter (ex: v2.1.11)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx tauri build --bundles nsis

      - name: Prepare release asset names
        id: assets
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.event.inputs.tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Tag de release introuvable"
          }

          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installateur NSIS introuvable"
          }

          Copy-Item $installer.FullName "Synchro Boîte à histoires-Windows.exe" -Force
          Copy-Item $installer.FullName ("Synchro Boîte à histoires_{0}_Windows_x64.exe" -f $tag.TrimStart('v')) -Force

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ steps.assets.outputs.tag }}" `
            "Synchro Boîte à histoires-Windows.exe" `
            ("Synchro Boîte à histoires_{0}_Windows_x64.exe" -f "${{ steps.assets.outputs.tag }}".TrimStart('v')) `
            --clobber